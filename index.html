<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyHub — Portal Wiedzy Psychologicznej</title>
  <link rel="icon" href="assets/brain.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="style.css">
  <script src="anime.min.js" defer></script>
  <script src="site-config.js" defer></script>
  <script src="specialization-test.js" defer></script>
  <script src="daily-psychology.js" defer></script>
  <script src="theoretical-test.js" defer></script>
  <style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:      #09090f;
  --bg2:     #0f0f18;
  --bg3:     #16161f;
  --bg4:     #1d1d28;
  --border:  #252535;
  --bord2:   #2e2e42;
  --t1: #f0f0f8;
  --t2: #9898b0;
  --t3: #5e5e76;
  --gold:    #c9a227;
  --goldt:   rgba(201,162,39,0.12);
  --goldl:   #e5c158;
  --blue:    #5b8cb8;
  --teal:    #4a9b9b;
  --rose:    #b86b7b;
  --green:   #5a9e6f;
  --purple:  #8b7ab8;
  --serif: 'Crimson Pro', Georgia, serif;
  --sans:  'Inter', system-ui, sans-serif;
  --mono:  'JetBrains Mono', monospace;
  --r: 10px;
  --sw: 292px;   /* sidebar width */
  --hh: 56px;    /* header height */
  --ease: 0.18s ease;
  --topbar-bg: rgba(9,9,15,.93);
  --hover-subtle: rgba(255,255,255,.03);
}

[data-theme="light"] {
  --bg:      #f5f5f0;
  --bg2:     #eeeeed;
  --bg3:     #e6e5e0;
  --bg4:     #dddcd6;
  --border:  #cccbc4;
  --bord2:   #bebdb6;
  --t1: #1c1c2e;
  --t2: #4a4a6a;
  --t3: #8a8a9e;
  --gold:    #a07a10;
  --goldt:   rgba(160,122,16,0.1);
  --goldl:   #c9a227;
  --blue:    #2e6098;
  --teal:    #2e7b7b;
  --rose:    #993050;
  --green:   #396b45;
  --purple:  #5e4e96;
  --topbar-bg: rgba(245,245,240,.93);
  --hover-subtle: rgba(0,0,0,.04);
}

[data-theme="sepia"] {
  --bg:      #1a1510;
  --bg2:     #221c14;
  --bg3:     #2c241a;
  --bg4:     #362c20;
  --border:  #40321e;
  --bord2:   #4e3e28;
  --t1: #f0e8d8;
  --t2: #c0aa88;
  --t3: #806850;
  --gold:    #d4a030;
  --goldt:   rgba(212,160,48,0.14);
  --goldl:   #e8bc5a;
  --blue:    #7aaccc;
  --teal:    #6ab8a0;
  --rose:    #c88070;
  --green:   #80a858;
  --purple:  #a890c8;
  --topbar-bg: rgba(26,21,16,.93);
  --hover-subtle: rgba(255,255,255,.04);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);line-height:1.7;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
strong{color:var(--t1);font-weight:600}
em{color:var(--goldl)}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar{
  width:var(--sw);
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:fixed;inset:0 auto 0 0;
  display:flex;flex-direction:column;
  z-index:200;
  transition:transform var(--ease);
}

/* logo */
.s-logo{
  flex-shrink:0;
  height:var(--hh);
  padding:0 1rem;
  display:flex;align-items:center;gap:0.7rem;
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.s-logo-mark{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--gold),var(--goldl));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
  box-shadow:0 2px 8px rgba(201,162,39,.22);
}
.s-logo-name{font-family:var(--serif);font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.s-logo-sub{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-top:.05rem}

/* search */
.s-search{flex-shrink:0;padding:.55rem .85rem;border-bottom:1px solid var(--border)}
.s-search-wrap{position:relative}
.s-search-wrap svg{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none}
.s-search input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:.38rem .7rem .38rem 2rem;color:var(--t1);font-size:.79rem;font-family:var(--sans);
  outline:none;transition:border-color var(--ease);
}
.s-search input::placeholder{color:var(--t3)}
.s-search input:focus{border-color:var(--gold)}

/* nav scroll */
.s-nav{flex:1;overflow-y:auto;padding:.3rem 0 1.4rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* group */
.nav-group{margin-bottom:.05rem}
.nav-group-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.45rem 1rem .25rem;cursor:pointer;user-select:none;
}
.nav-group-hdr:hover .ng-label{color:var(--t2)}
.ng-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);font-weight:700;transition:color var(--ease)}
.ng-arrow{width:13px;height:13px;color:var(--t3);transition:transform var(--ease);flex-shrink:0}
.nav-group.open .ng-arrow{transform:rotate(90deg)}
.nav-group.open .ng-label{color:var(--t2)}

/* items */
.nav-items{overflow:hidden;max-height:0;transition:max-height .26s ease}
.nav-group.open .nav-items{max-height:3000px}
.nav-item{
  display:flex;align-items:center;
  padding:.26rem 1rem .26rem 1.35rem;
  color:var(--t2);font-size:.79rem;line-height:1.35;
  cursor:pointer;border-left:2px solid transparent;
  transition:all var(--ease);
}
.nav-item:hover{color:var(--t1);background:var(--hover-subtle)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--goldt)}
.nav-item-test{
  position:relative;
  background:linear-gradient(90deg,rgba(91,140,184,.14),rgba(91,140,184,.02));
  border-left-color:rgba(91,140,184,.45);
}
.nav-item-test::after{
  content:'TESTY';
  margin-left:auto;
  font-size:.58rem;
  letter-spacing:.08em;
  font-weight:700;
  color:var(--blue);
  background:rgba(91,140,184,.18);
  border:1px solid rgba(91,140,184,.35);
  border-radius:999px;
  padding:.06rem .42rem;
}
.nav-item-test.active{
  color:var(--t1);
  border-left-color:var(--gold);
  background:linear-gradient(90deg,rgba(201,162,39,.2),rgba(91,140,184,.08));
}
.nav-item-test.active::after{
  color:#fff;
  background:rgba(201,162,39,.36);
  border-color:rgba(201,162,39,.5);
}
.nav-item.is-wiki{font-size:.76rem;color:var(--t3);padding-left:1.65rem}
.nav-item.is-wiki:hover{color:var(--goldl)}
.nav-item.is-wiki.active{color:var(--gold);border-left-color:var(--gold)}

/* footer */
.s-footer{
  flex-shrink:0;padding:.55rem 1rem;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:.6rem;color:var(--t3);
}
.ver{background:var(--goldt);color:var(--gold);border:1px solid rgba(201,162,39,.25);border-radius:99px;padding:.13rem .5rem;font-weight:700;font-size:.6rem}
.theme-btns{display:flex;gap:.28rem;align-items:center}
.theme-btn{
  width:16px;height:16px;border-radius:50%;border:2px solid var(--border);
  cursor:pointer;padding:0;transition:border-color var(--ease),transform var(--ease);
  flex-shrink:0;
}
.theme-btn:hover{transform:scale(1.2);border-color:var(--gold)}
.theme-btn.active{border-color:var(--gold);transform:scale(1.15)}
.theme-btn[data-theme="dark"]{background:#09090f}
.theme-btn[data-theme="light"]{background:#f5f5f0}
.theme-btn[data-theme="sepia"]{background:#1a1510}

/* ═══════════════════════════════════════════
   MAIN
═══════════════════════════════════════════ */
.main{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column}

/* topbar */
.topbar{
  height:var(--hh);position:sticky;top:0;
  background:var(--topbar-bg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.75rem;z-index:100;flex-shrink:0;
}
.breadcrumb{display:flex;align-items:center;gap:.38rem;font-size:.8rem;color:var(--t3);min-width:0;flex:1}
.breadcrumb a{color:var(--t3);cursor:pointer;white-space:nowrap}
.breadcrumb a:hover{color:var(--t2);text-decoration:none}
.breadcrumb .bsep{opacity:.35}
.breadcrumb .bcur{color:var(--gold);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-menu{display:none;background:none;border:none;color:var(--t2);cursor:pointer;padding:.38rem;border-radius:6px}
.btn-menu:hover{background:var(--bg3)}

/* progress */
.prog-bar{position:fixed;top:0;left:var(--sw);right:0;height:2px;z-index:300}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldl));width:0%;transition:width .08s linear}

/* content */
.content{flex:1;padding:2.5rem 2.4rem 5rem;width:100%}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:38vh;gap:.7rem;color:var(--t3);font-size:.87rem}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rendered{animation:fadeUp .28s ease both}

/* overlay (mobile) */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190}
.overlay.open{display:block}

/* ═══════════════════════════════════════════
   MD BODY
═══════════════════════════════════════════ */
.md h1{font-family:var(--serif);font-size:2.3rem;font-weight:700;line-height:1.2;letter-spacing:-.025em;margin-bottom:.8rem}
.md h2{font-family:var(--serif);font-size:1.5rem;font-weight:600;margin:2.6rem 0 .9rem;padding-bottom:.45rem;border-bottom:1px solid var(--border)}
.md h3{font-family:var(--serif);font-size:1.15rem;font-weight:600;margin:1.9rem 0 .65rem}
.md h4{font-size:.9rem;font-weight:600;margin:1.4rem 0 .45rem;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}
.md p{margin-bottom:.95rem;color:var(--t2);line-height:1.8}
.md ul,.md ol{margin:.7rem 0 1.2rem 1.5rem;color:var(--t2)}
.md li{margin-bottom:.35rem;line-height:1.65}
.md blockquote{border-left:3px solid var(--gold);background:var(--goldt);padding:.85rem 1.2rem;margin:1.4rem 0;border-radius:0 var(--r) var(--r) 0}
.md blockquote p{margin:0;color:var(--t2)}
.md code{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:.1em .38em;font-family:var(--mono);font-size:.84em;color:var(--goldl)}
.md pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem;overflow-x:auto;margin:1.2rem 0}
.md pre code{background:none;border:none;padding:0;font-size:.86rem;color:var(--t2)}
.md hr{border:none;border-top:1px solid var(--border);margin:2.3rem 0}
.md table{width:100%;border-collapse:collapse;font-size:.87rem;margin:1.4rem 0}
.md th{background:var(--bg3);font-weight:600;color:var(--t1);padding:.6rem .9rem;text-align:left;font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.md td{padding:.55rem .9rem;color:var(--t2);border-bottom:1px solid var(--border)}
.md tr:hover td{background:rgba(255,255,255,.015)}

/* test specjalności */
.test-wrap{max-width:920px}
.test-intro{color:var(--t2);margin-bottom:1.2rem}
.test-meta{font-size:.8rem;color:var(--t3);margin-bottom:1rem}
.test-card{background:linear-gradient(165deg,rgba(18,26,40,.96),rgba(13,18,30,.94));border:1px solid rgba(130,165,199,.28);box-shadow:0 10px 26px rgba(0,0,0,.26);border-radius:var(--r);padding:1.1rem 1.2rem;margin-bottom:1rem}
.test-q{font-family:var(--serif);font-size:1.2rem;line-height:1.35;margin-bottom:.9rem;color:#ecf4ff;text-shadow:0 1px 0 rgba(0,0,0,.24)}
.test-opts{display:grid;gap:.55rem}
.test-opt{background:rgba(24,34,51,.94);border:1px solid rgba(128,157,188,.34);border-radius:8px;color:#dbe8f8;text-align:left;padding:.72rem .85rem;cursor:pointer;transition:all var(--ease)}
.test-opt:hover{border-color:var(--gold);color:#fff;background:rgba(33,45,67,.98)}
.test-opt.sel{border-color:var(--gold);background:var(--goldt);color:var(--goldl)}
.test-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin:.9rem 0 1.3rem}
.test-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);border-radius:8px;padding:.56rem .85rem;cursor:pointer}
.test-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.test-btn:disabled{opacity:.5;cursor:not-allowed}
.test-btn.primary{background:rgba(91,140,184,.17);border-color:var(--blue);color:#b3d1ea}
.result-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem}
.result-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3)}
.result-main{font-family:var(--serif);font-size:1.6rem;line-height:1.2;margin:.35rem 0 .3rem}
.fit-grid{display:grid;gap:.55rem;margin-top:1rem}
.fit-row{display:grid;grid-template-columns:minmax(190px,260px) 1fr 48px;gap:.65rem;align-items:center}
.fit-lbl{font-size:.84rem;color:var(--t2)}
.fit-bar{height:11px;border-radius:999px;background:var(--bg3);border:1px solid var(--border);overflow:hidden}
.fit-fill{height:100%}
.fit-num{font-size:.76rem;color:var(--t3);text-align:right}
.axis-grid{display:grid;gap:.75rem;margin-top:1.2rem}
.axis-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.62rem .72rem}
.axis-head{display:flex;justify-content:space-between;font-size:.74rem;color:var(--t3);margin-bottom:.42rem}
.axis-track{position:relative;height:10px;background:linear-gradient(90deg,rgba(184,107,123,.5) 0%, rgba(155,155,176,.18) 50%, rgba(90,158,111,.45) 100%);border-radius:999px;border:1px solid var(--border)}
.axis-marker{position:absolute;top:-4px;width:3px;height:18px;background:var(--goldl);box-shadow:0 0 0 1px rgba(0,0,0,.4)}

/* psychologia codziennej */
.daily-wrap{max-width:860px}
.daily-day-badge{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);font-weight:700;margin-bottom:.5rem}
.daily-theme{font-size:.9rem;color:var(--t2);margin-bottom:1.8rem}
.daily-nav{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.6rem}
.daily-day-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t3);border-radius:8px;padding:.42rem .7rem;cursor:pointer;font-size:.78rem;transition:all var(--ease)}
.daily-day-btn:hover{border-color:var(--gold);color:var(--gold)}
.daily-day-btn.active{background:var(--goldt);border-color:var(--gold);color:var(--goldl);font-weight:600}
.daily-card{background:linear-gradient(165deg,rgba(18,26,40,.98),rgba(13,18,30,.95));border:1px solid rgba(130,165,199,.25);box-shadow:0 8px 24px rgba(0,0,0,.28);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1.1rem}
.daily-card-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem}
.daily-card-icon{font-size:1.4rem;line-height:1}
.daily-card-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;font-weight:700}
.daily-card-label.curiosity{color:#82b4d4}
.daily-card-label.exercise{color:#7ec8a0}
.daily-card-title{font-family:var(--serif);font-size:1.22rem;line-height:1.3;color:#ecf4ff;margin-bottom:.55rem}
.daily-card-lead{font-size:.9rem;color:var(--t2);font-style:italic;margin-bottom:.85rem;line-height:1.65;border-left:3px solid rgba(130,165,199,.3);padding-left:.85rem}
.daily-card-body{font-size:.87rem;color:var(--t2);line-height:1.7}
.daily-card-body p{margin-bottom:.7rem}
.daily-exercise-type{display:inline-block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;padding:.2rem .5rem;border-radius:4px;margin-bottom:.75rem;font-weight:600}
.daily-exercise-type.reflection{background:rgba(91,140,184,.18);color:#82b4d4;border:1px solid rgba(91,140,184,.3)}
.daily-exercise-type.challenge{background:rgba(184,107,123,.18);color:#d48a9e;border:1px solid rgba(184,107,123,.3)}
.daily-exercise-type.bodyscan{background:rgba(90,158,111,.18);color:#7ec8a0;border:1px solid rgba(90,158,111,.3)}
.daily-exercise-type.writing{background:rgba(201,162,39,.18);color:#d4b858;border:1px solid rgba(201,162,39,.3)}
.daily-exercise-type.mindfulness{background:rgba(138,107,184,.18);color:#b48dd4;border:1px solid rgba(138,107,184,.3)}
.daily-exercise-type.social{background:rgba(91,140,184,.18);color:#82b4d4;border:1px solid rgba(91,140,184,.3)}
.daily-exercise-type.creative{background:rgba(201,162,39,.18);color:#d4b858;border:1px solid rgba(201,162,39,.3)}
.daily-steps{list-style:none;padding:0;margin:.85rem 0 0;display:grid;gap:.55rem}
.daily-steps li{display:grid;grid-template-columns:24px 1fr;gap:.55rem;font-size:.87rem;color:var(--t2);line-height:1.65}
.daily-step-num{width:22px;height:22px;border-radius:50%;background:rgba(130,165,199,.15);border:1px solid rgba(130,165,199,.25);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#82b4d4;flex-shrink:0;margin-top:2px}
.daily-today-label{font-size:.7rem;color:var(--gold);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-left:.4rem}

/* testy teoretyczne */
.ttest-wrap{max-width:1120px}
.ttest-layout{
  display:grid;
  gap:1rem;
  grid-template-columns:1fr;
  grid-template-areas:
    "main"
    "side";
}
.ttest-layout--setup{
  grid-template-areas:
    "main"
    "side";
}
.ttest-side{grid-area:side}
.ttest-main{grid-area:main}
.ttest-section{margin-bottom:1.6rem}
.ttest-section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);font-weight:700;margin-bottom:.75rem}
.ttest-topic-list{display:grid;gap:.55rem;grid-template-columns:1fr}
.ttest-category-block{margin-bottom:1rem;padding:1rem 1rem .9rem;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
.ttest-category-block:last-child{margin-bottom:0}
.ttest-category-block.active{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,162,39,.2) inset}
.ttest-category-title{font-size:.8rem;font-weight:700;color:var(--t1);margin-bottom:.25rem}
.ttest-category-desc{font-size:.78rem;color:var(--t3);line-height:1.45;margin-bottom:.7rem}
.ttest-topic-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--t2);text-align:left;padding:.75rem 1rem;cursor:pointer;transition:all var(--ease);display:flex;align-items:center;gap:.65rem;font-size:.9rem}
.ttest-topic-btn:hover{border-color:var(--gold);color:var(--t1)}
.ttest-topic-btn.active{border-color:var(--gold);background:var(--goldt);color:var(--goldl)}
.ttest-topic-icon{font-size:1.1rem;line-height:1}
.ttest-options{display:flex;gap:.55rem;flex-wrap:wrap}
.ttest-opt-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t2);padding:.52rem .9rem;cursor:pointer;font-size:.85rem;transition:all var(--ease)}
.ttest-opt-btn:hover{border-color:var(--gold);color:var(--t1)}
.ttest-opt-btn.active{background:var(--goldt);border-color:var(--gold);color:var(--goldl);font-weight:600}
.ttest-diff-desc{font-size:.76rem;color:var(--t3);margin-top:.5rem;line-height:1.5}
.ttest-start-btn{margin-top:.6rem;padding:.7rem 1.6rem;background:linear-gradient(135deg,rgba(91,140,184,.25),rgba(91,140,184,.1));border:1px solid var(--blue);border-radius:var(--r);color:#b3d1ea;font-size:.95rem;cursor:pointer;font-family:var(--sans);transition:all var(--ease)}
.ttest-start-btn:hover{background:rgba(91,140,184,.3);color:#d6eaf8}
.ttest-progress-bar{height:5px;background:var(--bg3);border-radius:999px;overflow:hidden;margin-bottom:1.4rem;border:1px solid var(--border)}
.ttest-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:999px;transition:width .3s ease}
.ttest-q-card{background:linear-gradient(165deg,rgba(18,26,40,.96),rgba(13,18,30,.94));border:1px solid rgba(130,165,199,.28);box-shadow:0 10px 26px rgba(0,0,0,.26);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1rem}
.ttest-q-num{font-size:.75rem;color:var(--t3);margin-bottom:.7rem;letter-spacing:.06em}
.ttest-q-text{font-family:var(--serif);font-size:1.2rem;line-height:1.4;margin-bottom:1rem;color:#ecf4ff}
.ttest-answers{display:grid;gap:.52rem}
.ttest-ans-btn{background:rgba(24,34,51,.94);border:1px solid rgba(128,157,188,.34);border-radius:8px;color:#dbe8f8;text-align:left;padding:.72rem .85rem;cursor:pointer;transition:all var(--ease);display:grid;grid-template-columns:24px 1fr;gap:.6rem;align-items:start}
.ttest-ans-btn:hover:not(:disabled){border-color:var(--gold);color:#fff;background:rgba(33,45,67,.98)}
.ttest-ans-btn.sel{border-color:var(--gold);background:var(--goldt);color:var(--goldl)}
.ttest-ans-btn.correct{border-color:#5a9e6f;background:rgba(90,158,111,.18);color:#8fd4a0;cursor:default}
.ttest-ans-btn.wrong{border-color:#b86b7b;background:rgba(184,107,123,.18);color:#d4909e;cursor:default}
.ttest-ans-btn:disabled{cursor:default}
.ttest-ans-letter{font-weight:700;font-size:.8rem;opacity:.7;margin-top:2px}
.ttest-nav{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem}
.ttest-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);border-radius:8px;padding:.56rem .85rem;cursor:pointer;font-family:var(--sans);font-size:.85rem;transition:all var(--ease)}
.ttest-nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.ttest-nav-btn:disabled{opacity:.5;cursor:not-allowed}
.ttest-nav-btn.primary{background:rgba(91,140,184,.17);border-color:var(--blue);color:#b3d1ea}
.ttest-result-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.6rem;margin-top:1.2rem}
.ttest-result-score{font-family:var(--serif);font-size:2.4rem;font-weight:700;color:var(--t1);margin:.25rem 0 .1rem}
.ttest-result-pct{font-size:.9rem;color:var(--t3);margin-bottom:1.2rem}
.ttest-result-grade{display:inline-block;padding:.3rem .75rem;border-radius:6px;font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1.4rem}
.ttest-result-grade.excellent{background:rgba(90,158,111,.2);color:#7ec8a0;border:1px solid rgba(90,158,111,.35)}
.ttest-result-grade.good{background:rgba(91,140,184,.2);color:#82b4d4;border:1px solid rgba(91,140,184,.35)}
.ttest-result-grade.pass{background:rgba(201,162,39,.15);color:var(--goldl);border:1px solid rgba(201,162,39,.3)}
.ttest-result-grade.fail{background:rgba(184,107,123,.18);color:#d4909e;border:1px solid rgba(184,107,123,.3)}
.ttest-review-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin:1.4rem 0 .8rem;font-weight:700}
.ttest-review-item{border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;margin-bottom:.6rem;background:var(--bg3)}
.ttest-review-item.correct{border-color:rgba(90,158,111,.4);background:rgba(90,158,111,.07)}
.ttest-review-item.wrong{border-color:rgba(184,107,123,.4);background:rgba(184,107,123,.07)}
.ttest-review-q{font-size:.88rem;color:var(--t1);margin-bottom:.5rem;line-height:1.5}
.ttest-review-ans{font-size:.82rem;color:var(--t3);line-height:1.5}
.ttest-review-ans .correct-ans{color:#8fd4a0}
.ttest-review-ans .wrong-ans{color:#d4909e;text-decoration:line-through}
.ttest-review-just{font-size:.8rem;color:var(--t2);margin-top:.55rem;padding-top:.5rem;border-top:1px solid rgba(255,255,255,.07);line-height:1.6}
.ttest-review-just::before{content:"💡 ";opacity:.7}
.ttest-result-time{font-size:.85rem;color:var(--t3);margin-bottom:.6rem}
.ttest-pager{display:grid;grid-template-columns:repeat(auto-fit,minmax(34px,1fr));gap:.35rem;margin-top:.85rem}
.ttest-page-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t3);border-radius:8px;padding:.38rem .3rem;cursor:pointer;font-size:.73rem;line-height:1.2;min-height:32px}
.ttest-page-btn:hover{border-color:var(--gold);color:var(--gold)}
.ttest-page-btn.active{border-color:var(--gold);background:var(--goldt);color:var(--goldl);font-weight:700}
.ttest-page-btn.answered{border-color:rgba(90,158,111,.4);color:#8fd4a0}
.ttest-page-btn.unanswered{border-color:rgba(184,107,123,.35);color:#d4909e}
.ttest-sticky{position:sticky;top:calc(var(--hh) + .9rem);z-index:3;background:var(--bg)}
.ttest-review-controls{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center;margin:1rem 0 .6rem}
.ttest-filter-toggle{display:inline-flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--t2)}
.ttest-review-meta{font-size:.76rem;color:var(--t3)}

/* page hero */
.page-hero{padding-bottom:1.9rem;margin-bottom:2.3rem;border-bottom:1px solid var(--border)}
.chapter-lbl{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-weight:700;margin-bottom:.55rem}
.page-hero h1{font-family:var(--serif);font-size:2.5rem;font-weight:700;line-height:1.18;letter-spacing:-.025em;margin-bottom:.85rem}
.page-hero .lead{font-size:1.05rem;color:var(--t2);line-height:1.75;font-weight:300;max-width:630px}

/* page footer nav */
.page-nav{display:flex;justify-content:space-between;padding-top:2.3rem;margin-top:3rem;border-top:1px solid var(--border);gap:.8rem}
.pnav-btn{
  display:flex;align-items:center;gap:.45rem;
  padding:.55rem .95rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--t2);font-size:.81rem;cursor:pointer;transition:all var(--ease);
  max-width:250px;min-width:0;font-family:var(--sans);
}
.pnav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.pnav-btn:disabled{opacity:.28;cursor:default}
.pnav-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══════════════════════════════════════════
   PLAN ARTYKUŁÓW (rendered below each article)
═══════════════════════════════════════════ */
.plans-section{
  margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);
}
.plans-section h2{font-family:var(--serif);font-size:1.35rem;font-weight:600;margin-bottom:1.1rem;color:var(--t1)}
.plans-grid{display:grid;gap:.48rem}
.plan-item{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.65rem .9rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:border-color var(--ease),background var(--ease),transform var(--ease);
}
.plan-item:hover{border-color:var(--gold);background:var(--goldt);transform:translateY(-1px)}
.plan-item.planned{opacity:.45;cursor:default;pointer-events:none;border-style:dashed}
.plan-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:.48rem}
.plan-dot.live{background:var(--teal)}
.plan-dot.planned{background:var(--t3)}
.plan-label{flex:1;font-size:.88rem;color:var(--t1);line-height:1.4}
.plan-item.planned .plan-label{color:var(--t2)}
.plan-badge{
  flex-shrink:0;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  padding:.18rem .5rem;border-radius:99px;align-self:flex-start;margin-top:.18rem;border:1px solid transparent;
}
.plan-badge.live{background:rgba(74,155,155,.15);color:var(--teal);border-color:rgba(74,155,155,.3)}
.plan-badge.planned{background:var(--bg4);color:var(--t3);border-color:var(--border)}

/* ═══════════════════════════════════════════
   WIKI INDEX
═══════════════════════════════════════════ */
.wiki-hdr{padding-bottom:1.9rem;margin-bottom:2.3rem;border-bottom:1px solid var(--border)}
.wiki-hdr h1{font-family:var(--serif);font-size:2.3rem;font-weight:700;letter-spacing:-.025em;margin-bottom:.7rem}
.wiki-hdr .intro{font-size:1rem;color:var(--t2);line-height:1.75;max-width:670px}
.wiki-sec{margin-bottom:2.3rem}
.wiki-sec-title{font-family:var(--serif);font-size:1.25rem;font-weight:600;margin-bottom:.9rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.art-grid{display:grid;gap:.45rem}
.art-card{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.7rem .95rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:border-color var(--ease),background var(--ease),transform var(--ease);
}
.art-card:hover{border-color:var(--gold);background:var(--goldt);transform:translateY(-1px)}
.art-card.planned{opacity:.44;cursor:default;pointer-events:none;border-style:dashed}
.art-card.xlink{border-color:rgba(91,140,184,.22)}
.art-card.xlink:hover{border-color:var(--blue);background:rgba(91,140,184,.08)}
.art-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:.48rem}
.art-dot.live{background:var(--teal)}
.art-dot.planned{background:var(--t3)}
.art-dot.wiki{background:var(--gold)}
.art-dot.xlink{background:var(--blue)}
.art-body{flex:1;min-width:0}
.art-lbl{font-weight:600;font-size:.88rem;color:var(--t1);margin-bottom:.18rem;line-height:1.4}
.art-card.planned .art-lbl{color:var(--t2)}
.art-desc{font-size:.78rem;color:var(--t3);line-height:1.5}
.art-badge{
  flex-shrink:0;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  padding:.18rem .5rem;border-radius:99px;align-self:flex-start;margin-top:.18rem;border:1px solid transparent;
}
.art-badge.live{background:rgba(74,155,155,.15);color:var(--teal);border-color:rgba(74,155,155,.3)}
.art-badge.planned{background:var(--bg4);color:var(--t3);border-color:var(--border)}
.art-badge.wiki{background:var(--goldt);color:var(--gold);border-color:rgba(201,162,39,.3)}
.art-badge.xlink{background:rgba(91,140,184,.15);color:var(--blue);border-color:rgba(91,140,184,.3)}

/* ═══════════════════════════════════════════
   GLOSSARY
═══════════════════════════════════════════ */
.gloss-filter{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1.6rem;padding-bottom:.9rem;border-bottom:1px solid var(--border)}
.gloss-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.28rem .58rem;color:var(--t2);font-size:.76rem;cursor:pointer;transition:all var(--ease);font-family:var(--sans)}
.gloss-btn:hover,.gloss-btn.active{background:var(--gold);border-color:var(--gold);color:#000}
.gloss-group{margin-bottom:1.8rem}
.gloss-letter{font-family:var(--serif);font-size:1.6rem;font-weight:700;color:var(--gold);opacity:.5;margin-bottom:.5rem}
.gloss-entry{padding:.7rem 0;border-bottom:1px solid var(--border)}
.gloss-term{font-family:var(--serif);font-size:1.03rem;font-weight:600;margin-bottom:.28rem;display:flex;align-items:center;gap:.55rem}
.gloss-go{font-size:.68rem;font-family:var(--sans);color:var(--blue);font-weight:400;cursor:pointer;text-decoration:underline}
.gloss-def{color:var(--t2);font-size:.89rem;line-height:1.65}

/* ═══════════════════════════════════════════
   HOME
═══════════════════════════════════════════ */
.home-hero{padding:3.2rem 0 2.8rem;border-bottom:1px solid var(--border);margin-bottom:2.8rem}
.home-eyebrow{font-size:.65rem;text-transform:uppercase;letter-spacing:.2em;color:var(--gold);font-weight:700;margin-bottom:.9rem}
.home-hero h1{font-family:var(--serif);font-size:2.9rem;font-weight:700;line-height:1.15;letter-spacing:-.03em;margin-bottom:1.1rem}
.home-hero h1 span{color:var(--gold)}
.home-hero p{font-size:1.05rem;color:var(--t2);line-height:1.78;max-width:590px;margin-bottom:1.9rem;font-weight:300}
.home-stats{display:flex;gap:2rem;flex-wrap:wrap}
.stat-val{font-family:var(--serif);font-size:1.75rem;font-weight:700;color:var(--gold);line-height:1}
.stat-lbl{font-size:.68rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:.18rem}
.domains-h2{font-family:var(--serif);font-size:1.35rem;font-weight:600;margin-bottom:1.1rem}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem}
.domain-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;cursor:pointer;transition:border-color var(--ease),background var(--ease),transform var(--ease)}
.domain-card:hover{border-color:var(--gold);background:var(--goldt);transform:translateY(-2px)}
.d-icon{font-size:1.3rem;margin-bottom:.5rem}
.d-name{font-family:var(--serif);font-size:1.02rem;font-weight:600;margin-bottom:.3rem}
.d-desc{font-size:.76rem;color:var(--t3);line-height:1.5}
.d-count{display:inline-block;font-size:.62rem;color:var(--gold);background:var(--goldt);border:1px solid rgba(201,162,39,.22);border-radius:99px;padding:.1rem .48rem;font-weight:600;margin-top:.45rem}

/* error */
.error-box{padding:3rem 1rem;text-align:center;color:var(--t3)}
.error-box h2{color:var(--rose);margin-bottom:.5rem;font-family:var(--serif)}

/* empty article indicator */
.empty-banner{
  display:flex;align-items:center;gap:.75rem;
  background:rgba(184,107,123,.1);border:1px solid rgba(184,107,123,.3);
  border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:1.8rem;
}
.empty-banner-icon{font-size:1.15rem;flex-shrink:0}
.empty-banner-text{font-size:.9rem;color:var(--rose);line-height:1.5}
.test-zone-banner{
  display:flex;align-items:center;gap:.65rem;flex-wrap:wrap;
  margin:.85rem 0 1rem;padding:.62rem .82rem;
  border:1px solid rgba(91,140,184,.36);border-radius:999px;
  background:linear-gradient(90deg,rgba(91,140,184,.2),rgba(91,140,184,.06));
  color:var(--t1);
}
.test-zone-icon{font-size:.95rem;line-height:1}
.test-zone-title{font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.test-zone-desc{font-size:.78rem;color:var(--t2)}
.art-dot.empty{background:var(--rose)}
.art-badge.empty{background:rgba(184,107,123,.15);color:var(--rose);border-color:rgba(184,107,123,.3)}
.art-card.empty{border-color:rgba(184,107,123,.22)}
.art-card.empty:hover{border-color:var(--rose);background:rgba(184,107,123,.08)}
.art-card.empty .art-lbl{color:var(--t2)}
.plan-dot.empty{background:var(--rose)}
.plan-badge.empty{background:rgba(184,107,123,.15);color:var(--rose);border-color:rgba(184,107,123,.3)}
.plan-item.empty .plan-label{color:var(--t2)}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:900px){
  :root{--sw:272px}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .prog-bar{left:0}
  .btn-menu{display:flex;align-items:center}
  .content{padding:1.6rem 1.2rem 3.5rem}
  .home-hero h1{font-size:2.1rem}
  .page-hero h1{font-size:2rem}

  /* Mobilnie zwiększamy strefę dotyku i kontrast elementów nawigacji (zakładek). */
  .nav-group-hdr{padding:.7rem 1rem .45rem}
  .ng-label{font-size:.68rem;letter-spacing:.16em}
  .nav-item{
    padding:.5rem 1rem .5rem 1.35rem;
    font-size:.88rem;
    min-height:42px;
    align-items:center;
  }
  .nav-item.is-wiki{
    font-size:.84rem;
    padding-left:1.7rem;
  }
  .nav-item-test{
    border-left-width:3px;
    box-shadow:inset 0 0 0 1px rgba(91,140,184,.25);
  }
  .nav-item-test.active{
    border-left-width:4px;
    box-shadow:inset 0 0 0 1px rgba(201,162,39,.35),0 0 0 1px rgba(201,162,39,.18);
  }
  .nav-item-test::after{
    font-size:.55rem;
    padding:.08rem .4rem;
  }

  /* Spis artykułów: poprawa czytelności kart na mniejszych ekranach. */
  .wiki-sec{margin-bottom:1.9rem}
  .wiki-sec-title{font-size:1.15rem}
  .art-card{
    padding:.85rem .9rem;
    gap:.65rem;
  }
  .art-lbl{font-size:.94rem;line-height:1.45}
  .art-desc{font-size:.83rem;line-height:1.6}
  .art-badge{
    font-size:.66rem;
    padding:.22rem .55rem;
    margin-top:.12rem;
  }
}
@media(min-width:901px){
  .ttest-layout{
    grid-template-columns:minmax(260px,340px) 1fr;
    grid-template-areas:"side main";
    align-items:start;
  }
  .ttest-topic-list{grid-template-columns:repeat(2,minmax(0,1fr))}
  .test-actions.ttest-sticky,
  .ttest-nav.ttest-sticky{padding:.55rem .65rem;border:1px solid var(--border);border-radius:10px;background:rgba(9,9,15,.9);backdrop-filter:blur(8px)}
}

@media(max-width:640px){
  /* Bardzo małe ekrany: układ kart pionowy i większa separacja treści. */
  .content{padding:1.15rem .85rem 3rem}
  .topbar{padding:0 .8rem}
  .breadcrumb{font-size:.74rem}

  .art-card,
  .plan-item{
    flex-wrap:wrap;
    align-items:flex-start;
  }
  .art-badge,
  .plan-badge{
    margin-left:1.35rem;
  }
  .art-body{flex:1 1 100%}
  .art-lbl{font-size:.96rem}

  .page-hero{padding-bottom:1.3rem;margin-bottom:1.5rem}
  .wiki-hdr{padding-bottom:1.3rem;margin-bottom:1.5rem}
}
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="s-logo" onclick="navigate(SITE_CONFIG.defaultPage)">
    <div class="s-logo-mark">🧠</div>
    <div>
      <div class="s-logo-name">PsyHub</div>
      <div class="s-logo-sub">Portal Wiedzy</div>
    </div>
  </div>

  <div class="s-search">
    <div class="s-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Szukaj artykułu…" autocomplete="off">
    </div>
  </div>

  <nav class="s-nav" id="sidebarNav"></nav>

  <div class="s-footer">
    <span>PsyHub v3.2</span>
    <div class="theme-btns">
      <button class="theme-btn active" data-theme="dark"  title="Motyw ciemny"></button>
      <button class="theme-btn"        data-theme="light" title="Motyw jasny"></button>
      <button class="theme-btn"        data-theme="sepia" title="Motyw sepia"></button>
    </div>
    <span class="ver">bulbulgator</span>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ══ MAIN ═════════════════════════════════ -->
<div class="main">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <header class="topbar">
    <button class="btn-menu" onclick="openSidebar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <nav class="breadcrumb" id="breadcrumb">
      <a onclick="navigate(SITE_CONFIG.defaultPage)">PsyHub</a>
    </nav>
    <div></div>
  </header>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Ładowanie…</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   MINI MARKDOWN PARSER
══════════════════════════════════════════════════ */
function md2html(src) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl = s => {
    s = esc(s);
    return s
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  };

  // tables
  src = src.replace(/((?:\|.+\|\n){2,})/g, blk => {
    const rows = blk.trim().split('\n').filter(r => !/^[\s|:-]+$/.test(r));
    if (rows.length < 2) return blk;
    const hd = rows[0].split('|').slice(1,-1).map(c=>`<th>${inl(c.trim())}</th>`).join('');
    const bd = rows.slice(1).map(r=>'<tr>'+r.split('|').slice(1,-1).map(c=>`<td>${inl(c.trim())}</td>`).join('')+'</tr>').join('');
    return `<div style="overflow-x:auto;margin:1.4rem 0"><table><thead><tr>${hd}</tr></thead><tbody>${bd}</tbody></table></div>`;
  });
  src = src.replace(/^---+$/gm,'<hr>');
  src = src.replace(/^#{4}\s+(.+)$/gm,(_,t)=>`<h4>${inl(t)}</h4>`);
  src = src.replace(/^#{3}\s+(.+)$/gm,(_,t)=>`<h3>${inl(t)}</h3>`);
  src = src.replace(/^#{2}\s+(.+)$/gm,(_,t)=>`<h2>${inl(t)}</h2>`);
  src = src.replace(/^#{1}\s+(.+)$/gm,(_,t)=>`<h1>${inl(t)}</h1>`);
  src = src.replace(/((?:^>.*\n?)+)/gm, blk => {
    return `<blockquote><p>${inl(blk.replace(/^>\s?/gm,'').trim())}</p></blockquote>\n`;
  });
  src = src.replace(/((?:^[-*+]\s.+\n?)+)/gm, blk => {
    return '<ul>'+blk.trim().split('\n').map(l=>`<li>${inl(l.replace(/^[-*+]\s/,''))}</li>`).join('')+'</ul>\n';
  });
  src = src.replace(/((?:^\d+\.\s.+\n?)+)/gm, blk => {
    return '<ol>'+blk.trim().split('\n').map(l=>`<li>${inl(l.replace(/^\d+\.\s/,''))}</li>`).join('')+'</ol>\n';
  });
  /* Normalizuje granice bloków HTML, żeby parser akapitów nie wyświetlał tagów jako tekstu. */
  src = src
    .replace(/([^\n])\n(<(?:h[1-4]|blockquote|ul|ol|pre|div|hr)\b[^>]*>)/g, '$1\n\n$2')
    .replace(/(<\/(?:h[1-4]|blockquote|ul|ol|pre|div)>|<hr>)\n?(?=\S)/g, '$1\n\n');
  src = src.split('\n\n').map(blk => {
    blk = blk.trim();
    if (!blk) return '';
    if (/^<[a-z]/.test(blk)) return blk;
    return `<p>${inl(blk.replace(/\n/g,' '))}</p>`;
  }).join('\n');
  return src;
}

/* ══════════════════════════════════════════════════
   PAGE MAP & ROUTING
══════════════════════════════════════════════════ */
const pageMap = new Map();
const mdCache = new Map();
const emptyArticles = new Set();   /* IDs of articles whose files are empty or missing */
const testAnswers = [];
let testCurrentIndex = 0;
let testAttemptState = { started: false, completed: false };
let theoreticalTestState = null;
let   current = null;
const MOBILE_BREAKPOINT = 900; /* matches CSS @media(max-width:900px) */
const SPECIALIZATION_TEST_COUNTER_KEY = 'psyhub-specialization-test-counter';

/* Zwraca klucz daty (YYYY-MM-DD) w lokalnej strefie użytkownika do licznika dziennego. */
function getTodayDateKey() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

/* Odczytuje licznik z localStorage i zwraca bezpieczny obiekt z wartościami domyślnymi. */
function readSpecializationTestCounter() {
  try {
    const raw = localStorage.getItem(SPECIALIZATION_TEST_COUNTER_KEY);
    if (!raw) return { totalCompleted: 0, byDate: {} };
    const parsed = JSON.parse(raw);
    const totalCompleted = Number.isFinite(parsed?.totalCompleted) ? parsed.totalCompleted : 0;
    const byDate = (parsed && typeof parsed.byDate === 'object' && parsed.byDate) ? parsed.byDate : {};
    return { totalCompleted, byDate };
  } catch (_) {
    return { totalCompleted: 0, byDate: {} };
  }
}

/* Zapisuje zaktualizowany licznik wszystkich i dziennych ukończeń testu specjalizacji. */
function writeSpecializationTestCounter(counter) {
  localStorage.setItem(SPECIALIZATION_TEST_COUNTER_KEY, JSON.stringify(counter));
}

/* Rejestruje zakończone podejście dokładnie raz na jedno przejście testu. */
function registerCompletedSpecializationAttempt() {
  if (testAttemptState.completed) return;
  const counter = readSpecializationTestCounter();
  const todayKey = getTodayDateKey();
  counter.totalCompleted += 1;
  counter.byDate[todayKey] = (counter.byDate[todayKey] || 0) + 1;
  writeSpecializationTestCounter(counter);
  testAttemptState.completed = true;
}

function buildPageMap() {
  for (const sec of SITE_CONFIG.nav)
    for (const item of sec.items)
      pageMap.set(item.id, { ...item, section: sec.section });
}

/* ── Empty article indicator refresh ──────── */
const EMPTY_BANNER_HTML = `<div class="empty-banner"><span class="empty-banner-icon">⚠</span><div class="empty-banner-text">Artykuł jeszcze nie zawiera treści — zostanie uzupełniony wkrótce.</div></div>`;

function isBodyEmpty(text) {
  const h1m = text.match(/^#\s+(.+)$/m);
  const body = h1m ? text.slice(text.indexOf(h1m[0]) + h1m[0].length) : text;
  return !body.trim();
}

function updateEmptyIndicators() {
  emptyArticles.forEach(id => {
    document.querySelectorAll(`.art-card[data-artid="${id}"]`).forEach(el => {
      if (el.classList.contains('empty')) return;
      el.classList.remove('live','xlink','wiki','planned');
      el.classList.add('empty');
      const dot = el.querySelector('.art-dot');
      if (dot) dot.className = 'art-dot empty';
      const badge = el.querySelector('.art-badge');
      if (badge) { badge.className = 'art-badge empty'; badge.textContent = 'pusty'; }
    });
    document.querySelectorAll(`.plan-item[data-artid="${id}"]`).forEach(el => {
      if (el.classList.contains('empty')) return;
      el.classList.remove('live','planned');
      el.classList.add('empty');
      const dot = el.querySelector('.plan-dot');
      if (dot) dot.className = 'plan-dot empty';
      const badge = el.querySelector('.plan-badge');
      if (badge) { badge.className = 'plan-badge empty'; badge.textContent = 'pusty'; }
    });
  });
}

/* ── Sidebar rendering ─────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const active = current || SITE_CONFIG.defaultPage;
  const activeItem = pageMap.get(active);
  const activeSec  = activeItem ? activeItem.section : null;
  let html = '';
  for (const sec of SITE_CONFIG.nav) {
    const open = sec.section === activeSec;
    html += `<div class="nav-group${open?' open':''}" data-sec="${q(sec.section)}">`;
    html += `<div class="nav-group-hdr" onclick="toggleGroup(this)">`;
    html += `<span class="ng-label">${sec.section}</span>`;
    html += `<svg class="ng-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
    html += `</div><div class="nav-items">`;
    for (const item of sec.items) {
      if (item.href) {
        html += `<a class="nav-item nav-item-external" href="${q(item.href)}" target="_blank" rel="noopener noreferrer">${item.label} ↗</a>`;
      } else {
        const cls = ['nav-item', item.wiki?'is-wiki':'', item.kind === 'test' ? 'nav-item-test' : '', item.id===active?'active':''].filter(Boolean).join(' ');
        html += `<div class="${cls}" data-id="${item.id}" onclick="navigate('${item.id}')">${item.label}</div>`;
      }
    }
    html += `</div></div>`;
  }
  nav.innerHTML = html;
}
function q(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;') }

function toggleGroup(hdr) {
  const group = hdr.parentElement;
  const isOpen = group.classList.contains('open');
  document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
  if (!isOpen) group.classList.add('open');
}

function setActive(id) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
  const el = document.querySelector(`.nav-item[data-id="${id}"]`);
  if (el) {
    const group = el.closest('.nav-group');
    document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
    group?.classList.add('open');
    el.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
}

/* ── Navigate ──────────────────────────────── */
function navigate(id, replaceHistory) {
  if (!id) return;
  const item = pageMap.get(id);
  if (!item) return;
  current = id;
  if (replaceHistory) history.replaceState({id},'','#'+id);
  else                history.pushState({id},'','#'+id);
  setActive(id);
  closeSidebar();
  if (item.file)       loadMd(id, item);
  else if (item.custom === 'specialization_test') renderSpecializationTest(id, item);
  else if (item.custom === 'daily_psychology')    renderDailyPsychology(id, item);
  else if (item.custom === 'theoretical_test')    renderTheoreticalTest(id, item);
  else if (item.wiki)  renderWiki(id, item.wiki);
  else                 renderHome();
}

/* ── Load markdown ─────────────────────────── */
async function loadMd(id, item) {
  const area = document.getElementById('content');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>Ładowanie…</div>';
  setBreadcrumb(item);
  if (mdCache.has(item.file)) { renderMd(mdCache.get(item.file), id, item); prefetch(id); return; }
  try {
    const r = await fetch(item.file);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const t = await r.text();
    mdCache.set(item.file, t);
    if (isBodyEmpty(t)) { emptyArticles.add(id); updateEmptyIndicators(); }
    renderMd(t, id, item);
    prefetch(id);
  } catch(e) {
    /* file missing — treat as empty stub rather than hard error */
    emptyArticles.add(id);
    updateEmptyIndicators();
    const title = item.label;
    const {prev,next} = prevNext(id);
    const prevB = prev ? `<button class="pnav-btn" onclick="navigate('${prev.id}')"><span>← ${prev.label}</span></button>`
                       : `<button class="pnav-btn" disabled><span>←</span></button>`;
    const nextB = next ? `<button class="pnav-btn" onclick="navigate('${next.id}')"><span>${next.label} →</span></button>`
                       : `<button class="pnav-btn" disabled><span>→</span></button>`;
    const domainKey = id.split('/')[0];
    const planItems = (SITE_CONFIG.plans || {})[domainKey] || [];
    const plansHtml = planItems.length ? renderPlans(planItems, id) : '';
    area.innerHTML = `<div class="rendered">
      <div class="page-hero">
        <span class="chapter-lbl">${item.section||''}</span>
        <h1>${title}</h1>
      </div>
      ${EMPTY_BANNER_HTML}
      ${plansHtml}
      <div class="page-nav">${prevB}${nextB}</div>
    </div>`;
    window.scrollTo(0,0);
    animateContentIn();
  }
}

function renderMd(text, id, item) {
  const area = document.getElementById('content');
  // pull h1 out to hero
  const h1m   = text.match(/^#\s+(.+)$/m);
  const title = h1m ? h1m[1] : item.label;
  const body  = h1m ? text.slice(text.indexOf(h1m[0])+h1m[0].length) : text;
  const {prev,next} = prevNext(id);
  const prevB = prev ? `<button class="pnav-btn" onclick="navigate('${prev.id}')"><span>← ${prev.label}</span></button>`
                     : `<button class="pnav-btn" disabled><span>←</span></button>`;
  const nextB = next ? `<button class="pnav-btn" onclick="navigate('${next.id}')"><span>${next.label} →</span></button>`
                     : `<button class="pnav-btn" disabled><span>→</span></button>`;

  // domain plans block
  const domainKey = id.split('/')[0];
  const planItems = (SITE_CONFIG.plans || {})[domainKey] || [];
  const plansHtml = planItems.length ? renderPlans(planItems, id) : '';

  // empty content detection
  const isEmpty = isBodyEmpty(text);
  if (isEmpty) emptyArticles.add(id);
  const emptyBanner = isEmpty ? EMPTY_BANNER_HTML : '';

  area.innerHTML = `<div class="rendered">
    <div class="page-hero">
      <span class="chapter-lbl">${item.section||''}</span>
      <h1>${title}</h1>
    </div>
    ${emptyBanner}
    <div class="md">${md2html(body)}</div>
    ${plansHtml}
    <div class="page-nav">${prevB}${nextB}</div>
  </div>`;
  window.scrollTo(0,0);
  document.getElementById('progFill').style.width='0%';
  if (isEmpty) updateEmptyIndicators();
  animateContentIn();
}

function renderSpecializationTest(id, item) {
  const area = document.getElementById('content');
  setBreadcrumb(item);
  const test = window.SPECIALIZATION_TEST;
  if (!test) {
    area.innerHTML = '<div class="error-box"><h2>Błąd ładowania testu</h2><p>Nie udało się wczytać logiki testu specjalności.</p></div>';
    return;
  }

  const total = test.QUESTIONS.length;
  const answered = testAnswers.filter(v => typeof v === 'number').length;
  const counter = readSpecializationTestCounter();
  const todayCount = counter.byDate[getTodayDateKey()] || 0;
  const clampedIndex = Math.min(Math.max(testCurrentIndex, 0), total - 1);
  testCurrentIndex = Number.isFinite(clampedIndex) ? clampedIndex : 0;
  const question = test.QUESTIONS[testCurrentIndex];
  const specialtyFilters = test.SPECIALTIES.map(spec => `
    <div class="ttest-topic-btn">
      <span class="ttest-topic-icon">🎯</span>${spec.name}
    </div>
  `).join('');
  const options = question.options.map((opt, oIdx) => {
    const selected = testAnswers[testCurrentIndex] === oIdx ? 'sel' : '';
    return `<button class="test-opt ${selected}" onclick="selectTestAnswer(${testCurrentIndex},${oIdx})">${opt.text}</button>`;
  }).join('');
  const pagerHtml = renderQuestionPager(total, testCurrentIndex, testAnswers, 'goToQuestionIndex');
  const currentQ = `<div class="test-card">
    <div class="test-meta">Pytanie ${testCurrentIndex + 1} / ${total}</div>
    <div class="test-q">${question.text}</div>
    <div class="test-opts">${options}</div>
    ${pagerHtml}
  </div>`;

  const resultsBlock = answered === total ? renderTestResults(test.evaluate(testAnswers)) : '';

  area.innerHTML = `<div class="rendered test-wrap">
    <div class="page-hero">
      <span class="chapter-lbl">${item.section || ''}</span>
      <h1>Test wyboru specjalności</h1>
      <p class="lead">Odpowiedz na 20 pytań, aby uzyskać rekomendację specjalności, poziom dopasowania do pozostałych obszarów oraz profil na sześciu osiach decyzyjnych.</p>
    </div>
    ${renderTestZoneBanner()}
    <div class="ttest-layout">
      <aside class="ttest-side">
        <div class="ttest-section">
          <div class="ttest-section-title">Tematy specjalizacji</div>
          <div class="ttest-topic-list">${specialtyFilters}</div>
        </div>
        <div class="ttest-section">
          <div class="ttest-section-title">Nawigacja pytań</div>
          ${pagerHtml}
        </div>
      </aside>
      <section class="ttest-main">
        <p class="test-intro">Pytania są celowo nieoczywiste i zawierają scenki oraz dylematy etyczno-praktyczne (m.in. medycyna, farmakologia, diagnostyka, statystyka, neurologia i kompetencje miękkie).</p>
        <div class="test-meta">Udzielone odpowiedzi: <strong>${answered}/${total}</strong></div>
        <div class="test-meta">Wypełnione podejścia łącznie: <strong>${counter.totalCompleted}</strong> · Dzisiaj: <strong>${todayCount}</strong></div>
        <div class="test-actions ttest-sticky">
          <button class="test-btn" onclick="resetSpecializationTest()">Wyczyść odpowiedzi</button>
          <button class="test-btn" onclick="goToPrevQuestion()" ${testCurrentIndex===0?'disabled':''}>Poprzednie pytanie</button>
          <button class="test-btn primary" onclick="goToNextQuestion()" ${testCurrentIndex===total-1?'disabled':''}>Następne pytanie</button>
          <button class="test-btn" onclick="jumpToFirstUnanswered()" ${answered===total?'disabled':''}>Pierwsze nieuzupełnione</button>
        </div>
        ${currentQ}
        ${resultsBlock}
      </section>
    </div>
  </div>`;
  window.scrollTo(0,0);
  animateContentIn();
}

function renderTestResults(result) {
  const bars = result.ranking.map(r => `
    <div class="fit-row">
      <div class="fit-lbl">${r.name}</div>
      <div class="fit-bar"><div class="fit-fill" style="width:${r.percent}%;background:${r.color}"></div></div>
      <div class="fit-num">${r.percent}%</div>
    </div>`).join('');

  const axes = result.axes.map(axis => {
    const markerLeft = 50 + (axis.value / 2);
    return `<div class="axis-row">
      <div class="axis-head"><span>${axis.left}</span><span>${axis.right}</span></div>
      <div class="axis-track"><span class="axis-marker" style="left:calc(${markerLeft}% - 1px)"></span></div>
    </div>`;
  }).join('');

  return `<div class="result-box">
    <div class="result-title">Rekomendowana specjalność</div>
    <div class="result-main">${result.recommended.name}</div>
    <p>${result.recommended.desc}</p>
    <h3>Poziom dopasowania do wszystkich specjalności</h3>
    <div class="fit-grid">${bars}</div>
    <h3>Profil decyzyjny (osie dwubiegunowe)</h3>
    <div class="axis-grid">${axes}</div>
  </div>`;
}

window.selectTestAnswer = function(questionIndex, optionIndex) {
  /* Pierwsza odpowiedź oznacza rozpoczęcie nowego podejścia do testu. */
  testAttemptState.started = true;
  testAnswers[questionIndex] = optionIndex;
  const test = window.SPECIALIZATION_TEST;
  if (test && questionIndex < test.QUESTIONS.length - 1) {
    testCurrentIndex = questionIndex + 1;
  }
  /* Po domknięciu wszystkich odpowiedzi zapisujemy ukończone podejście. */
  const answered = testAnswers.filter(v => typeof v === 'number').length;
  if (test && answered === test.QUESTIONS.length) {
    registerCompletedSpecializationAttempt();
  }
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

window.resetSpecializationTest = function() {
  testAnswers.length = 0;
  testCurrentIndex = 0;
  /* Reset przygotowuje nową próbę i odblokowuje możliwość kolejnego zliczenia ukończenia. */
  testAttemptState = { started: false, completed: false };
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

window.goToPrevQuestion = function() {
  testCurrentIndex = Math.max(0, testCurrentIndex - 1);
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

window.goToNextQuestion = function() {
  const test = window.SPECIALIZATION_TEST;
  if (!test) return;
  testCurrentIndex = Math.min(test.QUESTIONS.length - 1, testCurrentIndex + 1);
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

/* Umożliwia skok do konkretnego pytania z mini-paginatora. */
window.goToQuestionIndex = function(index) {
  const test = window.SPECIALIZATION_TEST;
  if (!test) return;
  testCurrentIndex = Math.max(0, Math.min(test.QUESTIONS.length - 1, index));
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

window.jumpToFirstUnanswered = function() {
  const test = window.SPECIALIZATION_TEST;
  const missingIdx = test.QUESTIONS.findIndex((_, idx) => typeof testAnswers[idx] !== 'number');
  if (missingIdx < 0) return;
  testCurrentIndex = missingIdx;
  if (current === 'students/test_specjalnosci') {
    renderSpecializationTest(current, pageMap.get(current));
  }
};

/* ── Daily Psychology renderer ───────────────────── */
let dailySelectedDay = null; /* null = today */

function renderDailyPsychology(id, item) {
  const area = document.getElementById('content');
  setBreadcrumb(item);
  const data = window.DAILY_PSYCHOLOGY;
  if (!data) {
    area.innerHTML = '<div class="error-box"><h2>Błąd ładowania modułu</h2><p>Nie udało się wczytać danych psychologii codziennej.</p></div>';
    return;
  }
  const today = new Date().getDay(); /* 0=Sun … 6=Sat */
  const displayDay = (dailySelectedDay !== null) ? dailySelectedDay : today;
  const entry = data.find(e => e.day === displayDay) || data[0];

  const typeLabels = {
    reflection: 'Refleksja', challenge: 'Wyzwanie', bodyscan: 'Skan ciała',
    writing: 'Pisanie', mindfulness: 'Uważność', social: 'Wyzwanie społeczne', creative: 'Kreatywność'
  };

  const navBtns = data.map(e => {
    const isToday = e.day === today;
    const isActive = e.day === displayDay;
    const todayMark = isToday ? `<span class="daily-today-label">dziś</span>` : '';
    return `<button class="daily-day-btn${isActive ? ' active' : ''}" onclick="selectDailyDay(${e.day})">${e.emoji} ${e.dayName}${todayMark}</button>`;
  }).join('');

  const stepsHtml = entry.exercise.steps.map((step, i) =>
    `<li><span class="daily-step-num">${i + 1}</span><span>${step}</span></li>`
  ).join('');

  const bodyParas = entry.curiosity.body.map(p => `<p>${p}</p>`).join('');

  area.innerHTML = `<div class="rendered daily-wrap">
    <div class="page-hero">
      <span class="chapter-lbl">${item.section || ''}</span>
      <h1>Psychologia Codzienna</h1>
      <p class="lead">Codzienna dawka wiedzy psychologicznej i pracy nad sobą — zależnie od dnia tygodnia.</p>
    </div>
    <div class="daily-nav">${navBtns}</div>
    <div class="daily-day-badge">${entry.emoji} ${entry.dayName}</div>
    <div class="daily-theme">Temat dnia: <strong>${entry.theme}</strong></div>

    <div class="daily-card">
      <div class="daily-card-hdr">
        <span class="daily-card-icon">🧠</span>
