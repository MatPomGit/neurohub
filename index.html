<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyHub — Portal Wiedzy Psychologicznej</title>
  <link rel="icon" href="assets/brain.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="style.css">
  <script src="anime.min.js" defer></script>
  <script src="site-config.js" defer></script>
  <script src="specialization-test.js" defer></script>
  <script src="daily-psychology.js" defer></script>
  <script src="theoretical-test.js" defer></script>
  <script src="modules/tests-ui.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <button type="button" class="s-logo" id="sidebarLogo" aria-label="Przejdź do strony głównej">
    <div class="s-logo-mark">🧠</div>
    <div>
      <div class="s-logo-name">PsyHub</div>
      <div class="s-logo-sub">Portal Wiedzy</div>
    </div>
  </button>

  <div class="s-search">
    <div class="s-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Szukaj artykułu…" autocomplete="off">
    </div>
    <div class="s-filter-shortcuts" id="searchFilterShortcuts" aria-label="Skróty filtrów wyszukiwania">
      <button type="button" class="s-filter-btn" data-filter="tests">Tylko testy</button>
      <button type="button" class="s-filter-btn" data-filter="wiki">Tylko wiki</button>
      <button type="button" class="s-filter-btn" data-filter="beginner">Początkujący</button>
    </div>
    <div class="s-search-results" id="searchResults" aria-live="polite"></div>
  </div>

  <nav class="s-nav" id="sidebarNav" aria-label="Nawigacja boczna"></nav>

  <div class="s-footer">
    <span>PsyHub v3.2</span>
    <div class="theme-btns">
      <button class="theme-btn is-active" data-theme="dark"  title="Motyw ciemny"></button>
      <button class="theme-btn"        data-theme="light" title="Motyw jasny"></button>
      <button class="theme-btn"        data-theme="sepia" title="Motyw sepia"></button>
    </div>
    <span class="ver">bulbulgator</span>
  </div>
</aside>

<div class="overlay" id="overlay"></div>

<!-- ══ MAIN ═════════════════════════════════ -->
<main class="main" id="mainContent">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <header class="topbar">
    <button class="btn-menu" id="mobileMenuButton" type="button" aria-label="Otwórz menu nawigacyjne">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <nav class="breadcrumb" id="breadcrumb" aria-label="Okruszki nawigacji">
      <a onclick="navigate(SITE_CONFIG.defaultPage)">PsyHub</a>
    </nav>
    <div></div>
  </header>

  <section class="content" id="content" aria-live="polite">
    <div class="loading"><div class="spinner"></div>Ładowanie…</div>
  </section>
</main>


</body>
</html>
